spring:
  application:
    name: aml-screening-agent

  datasource:
    url: jdbc:h2:mem:amldb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

server:
  port: 8081

logging:
  level:
    com.bfsi.aml: INFO
    org.springframework.web: INFO
    org.hibernate: INFO

aws:
  s3:
    kyc-prefix: kyc-data/
    sar-prefix: sar-data/
    bucket-name: aml-screening-agent-bucket
  region: us-east-1
  bedrock:
    model-id: "anthropic.claude-2"